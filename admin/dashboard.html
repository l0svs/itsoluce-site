<!doctype html>
<html lang="fr" data-mode="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IT Soluce — ERP</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --a:#3b82f6;--ad:rgba(59,130,246,0.12);
  --bg:#0c0d0f;--bg2:#111214;--bg3:#18191c;--bg4:#1f2023;
  --ln:rgba(255,255,255,0.06);--ln2:rgba(255,255,255,0.1);
  --t1:#e8e8e8;--t2:#8a8f98;--t3:#4b5059;
  --ok:#34d399;--w:#fbbf24;--d:#f87171;
  --sw:220px;--th:48px;
}
[data-mode="light"]{
  --bg:#f8f8f8;--bg2:#fff;--bg3:#f2f2f4;--bg4:#eaeaec;
  --ln:rgba(0,0,0,0.06);--ln2:rgba(0,0,0,0.1);
  --t1:#111114;--t2:#52525b;--t3:#a1a1aa;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
/* TOPBAR */
.topbar{height:var(--th);background:var(--bg2);border-bottom:1px solid var(--ln);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;}
.logo-m{font-size:17px;font-weight:600;color:var(--a);letter-spacing:-1px;}
.logo-sep{width:1px;height:14px;background:var(--ln2);}
.logo-s{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:2px;}
.tb-div{width:1px;height:18px;background:var(--ln2);flex-shrink:0;}
.tb-badge{font-size:10px;font-weight:600;color:var(--a);background:var(--ad);padding:2px 7px;border-radius:3px;letter-spacing:.5px;flex-shrink:0;}
.tb-crumb{font-size:12px;color:var(--t3);flex:1;}
.tb-crumb span{color:var(--t2);}
.tb-r{display:flex;align-items:center;gap:8px;margin-left:auto;}
.tstrip{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--ln2);border-radius:6px;padding:4px 6px;}
.tdot{width:12px;height:12px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .12s;flex-shrink:0;}
.tdot:hover{transform:scale(1.25);}
.tdot.on{border-color:var(--t1);}
.tdot[data-c="blue"]{background:#3b82f6;}
.tdot[data-c="green"]{background:#34d399;}
.tdot[data-c="violet"]{background:#a78bfa;}
.tdot[data-c="amber"]{background:#fbbf24;}
.mstrip{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--ln2);border-radius:6px;padding:3px;gap:1px;}
.mbtn{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:4px;color:var(--t3);transition:all .12s;}
.mbtn:hover{color:var(--t1);background:var(--bg4);}
.mbtn.on{background:var(--ad);color:var(--a);}
.mbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
.upill{display:flex;align-items:center;gap:7px;padding:4px 8px 4px 4px;border:1px solid var(--ln2);border-radius:99px;background:var(--bg3);font-size:12px;color:var(--t2);}
.uav{width:22px;height:22px;border-radius:50%;background:var(--ad);color:var(--a);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.bout{padding:5px 10px;border:1px solid var(--ln2);border-radius:5px;background:none;color:var(--t3);font-size:11px;font-family:inherit;cursor:pointer;transition:all .12s;}
.bout:hover{color:var(--d);border-color:var(--d);}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--ln);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:8px 0;}
.ng{padding:14px 10px 4px;}
.ngl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 6px;margin-bottom:3px;}
.nl{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;font-size:13px;color:var(--t2);text-decoration:none;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .1s;margin-bottom:1px;}
.nl:hover{background:var(--bg3);color:var(--t1);}
.nl.active{background:var(--ad);color:var(--a);}
.nl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;opacity:.75;}
.nl.active svg{opacity:1;}
.nc{margin-left:auto;font-size:10px;font-weight:600;min-width:18px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;background:var(--bg4);color:var(--t3);padding:0 4px;}
.nc.w{background:rgba(251,191,36,.15);color:var(--w);}
.nc.d{background:rgba(248,113,113,.15);color:var(--d);}
.nhr{height:1px;background:var(--ln);margin:8px 10px;}
.sf{margin-top:auto;padding:10px 16px;border-top:1px solid var(--ln);font-size:10px;color:var(--t3);}
/* CONTENT */
.content{flex:1;overflow-y:auto;background:var(--bg);}
.page{padding:22px 26px;max-width:1600px;}
/* PAGE HEAD */
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.pt{font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-.3px;}
.pd{font-size:12px;color:var(--t3);margin-top:2px;}
.schip{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);background:var(--bg2);border:1px solid var(--ln2);border-radius:99px;padding:4px 10px;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 2px rgba(52,211,153,.2);animation:p 2.5s ease-in-out infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
/* GRID */
.g{display:grid;gap:10px;margin-bottom:10px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:1fr 1fr;}
.g52{grid-template-columns:5fr 2fr;}
.g32{grid-template-columns:3fr 2fr;}
.g23{grid-template-columns:2fr 3fr;}
.g21{grid-template-columns:2fr 1fr;}
/* KPI */
.kpi{background:var(--bg2);border:1px solid var(--ln);border-radius:8px;padding:14px 16px;}
.kl{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.3px;margin-bottom:6px;}
.kn{font-size:24px;font-weight:600;color:var(--t1);letter-spacing:-1px;line-height:1;margin-bottom:5px;}
.km{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
/* TAGS */
.tag{font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;}
.tok{background:rgba(52,211,153,.12);color:var(--ok);}
.tw{background:rgba(251,191,36,.12);color:var(--w);}
.td{background:rgba(248,113,113,.12);color:var(--d);}
.tb{background:var(--ad);color:var(--a);}
.tn{background:var(--bg4);color:var(--t2);}
/* SECTION */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;margin-top:6px;}
.sl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;}
.sa{font-size:11px;color:var(--a);text-decoration:none;cursor:pointer;opacity:.8;}
.sa:hover{opacity:1;}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--ln);border-radius:8px;overflow:hidden;}
.ch{padding:11px 14px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:12px;font-weight:600;color:var(--t1);}
.cl{font-size:11px;color:var(--a);text-decoration:none;opacity:.8;}
.cl:hover{opacity:1;}
/* ROW */
.row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--ln);gap:10px;transition:background .08s;}
.row:last-child{border-bottom:none;}
.row:hover{background:var(--bg3);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--ok);}
.dw{background:var(--w);}
.dd{background:var(--d);}
.db{background:var(--a);}
.dg{background:var(--t3);}
.rm{flex:1;min-width:0;}
.rn{font-size:12px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rs{font-size:11px;color:var(--t3);margin-top:1px;}
.rr{font-size:11px;color:var(--t3);text-align:right;flex-shrink:0;}
.rr strong{display:block;font-size:12px;color:var(--t1);font-weight:500;}
/* CHART */
.chart-wrap{padding:14px;position:relative;height:160px;}
.chart-wrap canvas{width:100%!important;}
/* TÂCHES */
.task{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--ln);transition:background .08s;cursor:pointer;}
.task:last-child{border-bottom:none;}
.task:hover{background:var(--bg3);}
.tbox{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--t3);flex-shrink:0;transition:all .15s;}
.tbox.done{background:var(--ok);border-color:var(--ok);}
.ttxt{font-size:12px;color:var(--t1);flex:1;}
.ttxt.done{color:var(--t3);text-decoration:line-through;}
/* FOURNISSEURS */
.frow{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--ln);gap:10px;transition:background .08s;}
.frow:last-child{border-bottom:none;}
.frow:hover{background:var(--bg3);}
.fav{width:28px;height:28px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--t2);flex-shrink:0;}
.fm{flex:1;min-width:0;}
.fn{font-size:12px;color:var(--t1);font-weight:500;}
.fs{font-size:11px;color:var(--t3);margin-top:1px;}
/* STARS */
.stars{display:flex;gap:1px;}
.star{font-size:10px;color:var(--w);}
.star.off{color:var(--bg4);}
/* WHATSAPP */
.wa-card{background:var(--bg2);border:1px solid var(--ln);border-radius:8px;overflow:hidden;}
.wa-head{padding:11px 14px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:8px;}
.wa-ico{width:28px;height:28px;border-radius:7px;background:rgba(37,211,102,.12);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.wa-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--ln);}
.wa-s{background:var(--bg2);padding:12px 14px;}
.wa-sl{font-size:10px;color:var(--t3);font-weight:500;margin-bottom:4px;}
.wa-sv{font-size:20px;font-weight:600;color:var(--t1);letter-spacing:-1px;}
.wa-msg{display:flex;align-items:flex-start;padding:8px 14px;border-bottom:1px solid var(--ln);gap:8px;}
.wa-msg:last-child{border-bottom:none;}
.wa-bubble{background:var(--bg3);border-radius:0 8px 8px 8px;padding:7px 10px;flex:1;}
.wa-bname{font-size:10px;font-weight:600;color:var(--a);margin-bottom:2px;}
.wa-btext{font-size:12px;color:var(--t1);line-height:1.5;}
.wa-btime{font-size:10px;color:var(--t3);margin-top:3px;}
/* SOCIAL */
.srow{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--ln);gap:10px;}
.srow:last-child{border-bottom:none;}
.sico{width:26px;height:26px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
/* CAL */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:10px 12px;}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);border-radius:3px;}
.cdh{font-weight:600;font-size:9px;color:var(--t3);}
.cdt{background:var(--a);color:#fff;font-weight:600;}
.cde{background:var(--ad);color:var(--a);}
/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;height:100%;gap:8px;font-size:12px;color:var(--t3);}
.spin{width:14px;height:14px;border:1.5px solid var(--ln2);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* INSIGHT BOX */
.insight{background:var(--ad);border:1px solid var(--a);border-radius:8px;padding:12px 16px;display:flex;align-items:flex-start;gap:10px;}
.insight-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.insight-text{font-size:12px;color:var(--t1);line-height:1.6;}
.insight-text strong{color:var(--a);}
/* RESPONSIVE */
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.g52,.g32,.g23,.g21{grid-template-columns:1fr;}}
@media(max-width:640px){.sidebar{display:none;}.g4,.g3,.g2{grid-template-columns:1fr 1fr;}.page{padding:14px;}}
</style>
</head>
<body>

<header class="topbar">
  <a href="/admin/dashboard.html" class="logo">
    <span class="logo-m">IT</span><span class="logo-sep"></span><span class="logo-s">SOLUCE</span>
  </a>
  <div class="tb-div"></div>
  <span class="tb-badge">ERP</span>
  <span class="tb-crumb"><span>Dashboard</span></span>
  <div class="tb-r">
    <div class="tstrip">
      <div class="tdot on" data-c="blue"   onclick="setAccent('#3b82f6','rgba(59,130,246,0.12)')"></div>
      <div class="tdot"    data-c="green"  onclick="setAccent('#34d399','rgba(52,211,153,0.12)')"></div>
      <div class="tdot"    data-c="violet" onclick="setAccent('#a78bfa','rgba(167,139,250,0.12)')"></div>

    </div>
    <div class="mstrip">

      </button>
      <button class="mbtn on" data-m="auto" onclick="setMode('auto')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="mbtn" data-m="dark" onclick="setMode('dark')">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <div class="tb-div"></div>
    <div class="upill">
      <div class="uav" id="uAv">—</div>
      <span id="uEmail" style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</span>
    </div>
    <button class="bout" onclick="doLogout()">Quitter</button>
  </div>
</header>

  <aside class="sidebar">
    <div class="ng">
      <div class="ngl">Vue d'ensemble</div>
      <button class="nl active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</button>
    </div>
    <div class="nhr"></div>
    <div class="ng">
      <div class="ngl">Opérations</div>
      <a href="/admin/stock.html" class="nl"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Stock<span class="nc w" id="nb-alert">—</span></a>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Réparations<span class="nc" id="nb-rep">0</span></button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clients<span class="nc">0</span></button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Fournisseurs<span class="nc" id="nb-four">—</span></button>
    </div>
    <div class="nhr"></div>
    <div class="ng">
      <div class="ngl">Finance</div>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Devis<span class="nc">0</span></button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Factures<span class="nc">0</span></button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Statistiques</button>
    </div>
    <div class="nhr"></div>
    <div class="ng">
      <div class="ngl">Communication</div>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>WhatsApp<span class="nc" id="nb-wa">0</span></button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Marketing</button>
      <button class="nl" onclick="soon()"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planning</button>
    </div>
    <div class="nhr"></div>
    <div class="ng">

<script>
function setAccent(c,d){
  document.documentElement.style.setProperty('--a',c)
  document.documentElement.style.setProperty('--ad',d)
  localStorage.setItem('erp-a',c)
  localStorage.setItem('erp-d',d)
  document.querySelectorAll('.tdot').forEach(e=>e.classList.remove('on'))
  event.target.classList.add('on')
  if(window._charts) window._charts.forEach(ch=>{
    ch.data.datasets.forEach(ds=>{ds.backgroundColor=ds.backgroundColor instanceof Array?ds.backgroundColor.map(()=>d):d;ds.borderColor=c;})
    ch.update()
  })
}
function applyMode(m){
  const e=(m==='auto')?(new Date().getHours()>=7&&new Date().getHours()<20?'light':'dark'):m
  document.documentElement.setAttribute('data-mode',e)
  const lv=e==='light'
  const v=(a,b)=>lv?a:b
  document.documentElement.style.setProperty('--bg',   v('#f8f8f8','#0c0d0f'))
  document.documentElement.style.setProperty('--bg2',  v('#ffffff','#111214'))
  document.documentElement.style.setProperty('--bg3',  v('#f2f2f4','#18191c'))
  document.documentElement.style.setProperty('--bg4',  v('#eaeaec','#1f2023'))
  document.documentElement.style.setProperty('--ln',   v('rgba(0,0,0,0.06)','rgba(255,255,255,0.06)'))
  document.documentElement.style.setProperty('--ln2',  v('rgba(0,0,0,0.1)','rgba(255,255,255,0.1)'))
  document.documentElement.style.setProperty('--t1',   v('#111114','#e8e8e8'))
  document.documentElement.style.setProperty('--t2',   v('#52525b','#8a8f98'))
  document.documentElement.style.setProperty('--t3',   v('#a1a1aa','#4b5059'))
  if(window._charts) window._charts.forEach(ch=>{ch.options.scales&&Object.values(ch.options.scales).forEach(s=>{s.ticks&&(s.ticks.color=v('#a1a1aa','#4b5059'));s.grid&&(s.grid.color=v('rgba(0,0,0,0.06)','rgba(255,255,255,0.06)'))});ch.update()})
}
function setMode(m){
  localStorage.setItem('erp-m',m)
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on',b.dataset.m===m))
  applyMode(m)
}
const sa=localStorage.getItem('erp-a'),sd=localStorage.getItem('erp-d')
if(sa){document.documentElement.style.setProperty('--a',sa);document.documentElement.style.setProperty('--ad',sd)}
const sm=localStorage.getItem('erp-m')||'auto'
document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on',b.dataset.m===sm))
applyMode(sm)
setInterval(()=>{if((localStorage.getItem('erp-m')||'auto')==='auto')applyMode('auto')},60000)
window.soon=()=>{}
window._charts=[]
</script>

    <div class="row"><div class="dot ${caMonth>=85?'dok':'dd'}"></div><div class="rm"><div class="rn">CA ce mois</div></div><div class="rr" style="color:${caMonth>=85?'var(--ok)':'var(--d)'}"><strong>${caMonth.toFixed(0)} €</strong></div></div>
    <div class="row"><div class="dot dok"></div><div class="rm"><div class="rn">Seuil rentabilité</div><div class="rs">~1-2 répar./mois</div></div><div class="rr"><strong style="color:var(--ok)">85 €</strong></div></div>
  </div>
</div>
`

document.getElementById('ldr').style.display='none'
document.getElementById('pg').style.display='block'

// Couleurs pour les charts
const accent=getComputedStyle(document.documentElement).getPropertyValue('--a').trim()||'#3b82f6'
const dim=getComputedStyle(document.documentElement).getPropertyValue('--ad').trim()||'rgba(59,130,246,0.12)'
const grid=getComputedStyle(document.documentElement).getPropertyValue('--ln').trim()||'rgba(255,255,255,0.06)'
const tc=getComputedStyle(document.documentElement).getPropertyValue('--t3').trim()||'#4b5059'

const commonOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(0,0,0,0.8)',titleFont:{size:11},bodyFont:{size:11},padding:8}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:grid}},y:{ticks:{color:tc,font:{size:10}},grid:{color:grid},beginAtZero:true}}}

// Chart CA
const ctxCA=document.getElementById('chartCA')
if(ctxCA){
  const c=new Chart(ctxCA,{type:'bar',data:{labels:${JSON.stringify(months)},datasets:[{label:'CA (€)',data:${JSON.stringify(caByMonth)},backgroundColor:dim,borderColor:accent,borderWidth:1.5,borderRadius:4}]},options:{...commonOpts,plugins:{...commonOpts.plugins,tooltip:{...commonOpts.plugins.tooltip,callbacks:{label:c=>`${c.parsed.y}€`}}}}})
  window._charts.push(c)
}

// Chart Stock doughnut
const ctxS=document.getElementById('chartStock')
if(ctxS){
  const cats=${JSON.stringify(catLabels)}
  const vals=${JSON.stringify(catVals)}
  const baseColors=['#3b82f6','#34d399','#fbbf24','#f87171','#a78bfa','#06b6d4','#fb923c']
  if(cats.length===0){cats.push('Vide');vals.push(1)}
  const c=new Chart(ctxS,{type:'doughnut',data:{labels:cats,datasets:[{data:vals,backgroundColor:baseColors.slice(0,cats.length),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:true,position:'bottom',labels:{color:tc,font:{size:10},padding:6,boxWidth:10}}}}})
  window._charts.push(c)
}

// Chart Réparations
const ctxR=document.getElementById('chartReps')
if(ctxR){
  const c=new Chart(ctxR,{type:'line',data:{labels:${JSON.stringify(months)},datasets:[{label:'Réparations',data:${JSON.stringify(repsCountByMonth)},borderColor:accent,backgroundColor:dim,fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:accent}]},options:{...commonOpts}})
  window._charts.push(c)
}

// Chart Alertes stock (jauge horizontale)
const ctxAl=document.getElementById('chartAlerts')
if(ctxAl){
  const top5=stock.sort((a,b)=>Number(a.quantite)-Number(b.quantite)).slice(0,5)
  const c=new Chart(ctxAl,{type:'bar',data:{labels:top5.map(p=>p.nom.substring(0,18)),datasets:[{label:'Stock',data:top5.map(p=>p.quantite),backgroundColor:top5.map(p=>Number(p.quantite)<=Number(p.seuil_alerte)?'rgba(248,113,113,0.3)':dim),borderColor:top5.map(p=>Number(p.quantite)<=Number(p.seuil_alerte)?'#f87171':accent),borderWidth:1.5,borderRadius:3}]},options:{...commonOpts,indexAxis:'y',scales:{x:{...commonOpts.scales.x,beginAtZero:true},y:{...commonOpts.scales.y,ticks:{...commonOpts.scales.y.ticks,font:{size:9}}}}}})
  window._charts.push(c)
}

// Chart Rentabilité (gauge)
const ctxRenta=document.getElementById('chartRenta')
if(ctxRenta){
  const pct=Math.min((caMonth/85)*100,150)
  const c=new Chart(ctxRenta,{type:'doughnut',data:{labels:['CA','Restant'],datasets:[{data:[Math.min(caMonth,85),Math.max(0,85-caMonth)],backgroundColor:[caMonth>=85?'rgba(52,211,153,0.4)':'rgba(251,191,36,0.4)',grid],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}}})
  window._charts.push(c)
}

window.doLogout=async()=>{await sb.auth.signOut();window.location.href='/admin/login.html'}
</script>
</body>
</html>
