<!doctype html>
<html lang="fr" data-theme="blue">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IT Soluce ERP</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#0052CC;--accent-dark:#003d99;--accent-light:#1a2a4a;
  --bg:#0f1117;--bg2:#16181f;--bg3:#1e2029;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f2;--text2:#9ca3af;--text3:#6b7280;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
  --sidebar-w:240px;--topbar-h:56px;--radius:10px;--radius-lg:14px;
}
[data-theme="blue"]{--accent:#0052CC;--accent-dark:#003d99;--accent-light:#1a2a4a;}
[data-theme="green"]{--accent:#059669;--accent-dark:#047857;--accent-light:#052e1c;}
[data-theme="purple"]{--accent:#7c3aed;--accent-dark:#6d28d9;--accent-light:#2d1a4a;}
[data-theme="red"]{--accent:#dc2626;--accent-dark:#b91c1c;--accent-light:#3a1a1a;}
[data-theme="light"]{--bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f2;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:50;}
.topbar__logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.topbar__mark{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-1.5px;}
.topbar__name{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:3px;}
.topbar__sep{width:1px;height:20px;background:var(--border2);flex-shrink:0;}
.topbar__badge{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
.topbar__breadcrumb{flex:1;font-size:12px;color:var(--text3);}
.topbar__breadcrumb span{color:var(--text);font-weight:500;}
.topbar__actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
.theme-switcher{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 7px;}
.theme-dot{width:13px;height:13px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s ease;flex-shrink:0;}
.theme-dot:hover{transform:scale(1.2);}
.theme-dot.active{border-color:var(--text);}
.theme-dot[data-t="blue"]{background:#0052CC;}
.theme-dot[data-t="green"]{background:#059669;}
.theme-dot[data-t="purple"]{background:#7c3aed;}
.theme-dot[data-t="red"]{background:#dc2626;}
.theme-dot[data-t="light"]{background:#e5e5ea;border:2px solid #aeaeb2;}
.topbar__user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.topbar__avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all 0.15s ease;}
.btn-sm:hover{color:var(--danger);border-color:var(--danger);background:rgba(239,68,68,0.08);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar__section{padding:16px 12px 4px;}
.sidebar__label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all 0.15s ease;text-decoration:none;position:relative;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:0.8;}
.nav-item.active svg{opacity:1;}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px;background:var(--bg3);color:var(--text3);flex-shrink:0;}
.nav-badge--alert{background:var(--danger)!important;color:#fff!important;}
.sidebar__divider{height:1px;background:var(--border);margin:8px 12px;}
.sidebar__bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.sidebar__version{font-size:10px;color:var(--text3);text-align:center;}
.content{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;}
.page{padding:28px 32px;flex:1;}
.page__header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.page__title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.4px;}
.page__sub{font-size:13px;color:var(--text3);margin-top:3px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;transition:border-color 0.2s ease;}
.stat:hover{border-color:var(--border2);}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity 0.2s ease;}
.stat:hover::before{opacity:1;}
.stat--alert::before{background:var(--danger);opacity:1;}
.stat__label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;}
.stat__value{font-size:30px;font-weight:600;color:var(--text);letter-spacing:-1.5px;line-height:1;}
.stat--alert .stat__value{color:var(--danger);}
.stat__trend{font-size:12px;color:var(--text3);}
.stat__icon{position:absolute;bottom:16px;right:16px;opacity:0.06;}
.stat__icon svg{width:38px;height:38px;stroke:var(--text);fill:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.module{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;cursor:pointer;transition:all 0.2s ease;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;}
.module:hover{border-color:var(--accent);transform:translateY(-1px);}
.module--locked{opacity:0.45;cursor:default;}
.module--locked:hover{border-color:var(--border);transform:none;}
.module__header{display:flex;align-items:flex-start;justify-content:space-between;}
.module__icon{width:38px;height:38px;border-radius:9px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;}
.module__icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.module__status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:0.5px;}
.module__status--ok{background:rgba(34,197,94,0.15);color:var(--success);}
.module__status--soon{background:var(--bg3);color:var(--text3);}
.module__name{font-size:14px;font-weight:600;color:var(--text);}
.module__desc{font-size:12px;color:var(--text3);line-height:1.6;}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.card__head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card__head-title{font-size:13px;font-weight:600;color:var(--text);}
.card__head-action{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:none;}
.list-row{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid var(--border);transition:background 0.1s ease;}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:var(--bg3);}
.list-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.list-dot--ok{background:var(--success);}
.list-dot--warn{background:var(--warning);}
.list-dot--alert{background:var(--danger);}
.list-main{font-size:13px;color:var(--text);flex:1;}
.list-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.list-right{font-size:12px;color:var(--text3);text-align:right;flex-shrink:0;}
.empty-state{padding:32px 20px;text-align:center;color:var(--text3);font-size:13px;}
.loading-full{display:flex;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);font-size:13px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1100px){.stats-row{grid-template-columns:repeat(2,1fr);}.modules-grid{grid-template-columns:repeat(2,1fr);}.bottom-grid{grid-template-columns:1fr;}}
@media(max-width:700px){.sidebar{display:none;}.stats-row{grid-template-columns:1fr 1fr;}.modules-grid{grid-template-columns:1fr;}.page{padding:20px 16px;}}
</style>
</head>
<body>
<header class="topbar">
  <a href="/admin/dashboard.html" class="topbar__logo">
    <span class="topbar__mark">IT</span>
    <span class="topbar__name">SOLUCE</span>
  </a>
  <div class="topbar__sep"></div>
  <span class="topbar__badge">ERP</span>
  <div class="topbar__breadcrumb"><span>Dashboard</span></div>
  <div class="topbar__actions">
    <div class="theme-switcher" title="Changer le thème">
      <div class="theme-dot active" data-t="blue" onclick="setTheme('blue')"></div>
      <div class="theme-dot" data-t="green" onclick="setTheme('green')"></div>
      <div class="theme-dot" data-t="purple" onclick="setTheme('purple')"></div>
      <div class="theme-dot" data-t="red" onclick="setTheme('red')"></div>
      <div class="theme-dot" data-t="light" onclick="setTheme('light')"></div>
    </div>
    <div class="topbar__sep"></div>
    <div class="topbar__user">
      <div class="topbar__avatar" id="userAvatar">—</div>
      <span id="userEmail">—</span>
    </div>
    <button class="btn-sm" onclick="handleLogout()">Déconnexion</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">Navigation</div>
      <button class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
    </div>
    <div class="sidebar__divider"></div>
    <div class="sidebar__section">
      <div class="sidebar__label">Opérations</div>
      <a href="/admin/stock.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Stock
        <span class="nav-badge" id="nb-stock">—</span>
      </a>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Réparations
        <span class="nav-badge" id="nb-rep">0</span>
      </button>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Clients
        <span class="nav-badge">0</span>
      </button>
    </div>
    <div class="sidebar__divider"></div>
    <div class="sidebar__section">
      <div class="sidebar__label">Finance</div>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Devis & Factures
      </button>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Statistiques
      </button>
    </div>
    <div class="sidebar__divider"></div>
    <div class="sidebar__section">
      <div class="sidebar__label">Organisation</div>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Planning
      </button>
      <button class="nav-item" onclick="soon()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Paramètres
      </button>
    </div>
    <div class="sidebar__bottom">
      <div class="sidebar__version">IT Soluce ERP v1.0</div>
    </div>
  </aside>

  <main class="content">
    <div class="loading-full" id="loadingState"><div class="spin"></div>Chargement...</div>
    <div class="page" id="pageContent" style="display:none;"></div>
  </main>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const SUPABASE_URL = 'https://esltsiutcjcwdbhkkvms.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbHRzaXV0Y2pjd2RiaGtrdm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjM2OTEsImV4cCI6MjA5NzMzOTY5MX0.Sl2cdnqEr7VSBeq1wwMBpfQW9yBB0IG9RkOiZi9GXvo'
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = '/admin/login.html' }

const email = session.user.email
document.getElementById('userEmail').textContent = email
document.getElementById('userAvatar').textContent = email[0].toUpperCase()

const savedTheme = localStorage.getItem('erp-theme') || 'blue'
setTheme(savedTheme)

window.setTheme = function(t) {
  document.documentElement.setAttribute('data-theme', t)
  localStorage.setItem('erp-theme', t)
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.t === t))
}

const { data: stockData } = await supabase.from('stock').select('*')
const totalRefs = stockData?.length || 0
const alertes = stockData?.filter(p => Number(p.quantite) <= Number(p.seuil_alerte)).length || 0
const valeurStock = stockData?.reduce((a, p) => a + (Number(p.quantite) * Number(p.prix_achat)), 0) || 0
const recent = stockData ? [...stockData].sort((a,b) => new Date(b.updated_at||b.created_at) - new Date(a.updated_at||a.created_at)).slice(0,5) : []

document.getElementById('nb-stock').textContent = totalRefs
if (alertes > 0) { document.getElementById('nb-stock').className = 'nav-badge nav-badge--alert'; document.getElementById('nb-stock').textContent = alertes }

const heure = new Date().getHours()
const salut = heure < 12 ? 'Bonjour' : heure < 18 ? 'Bon après-midi' : 'Bonsoir'

document.getElementById('pageContent').innerHTML = `
<div class="page__header">
  <div>
    <div class="page__title">${salut} 👋</div>
    <div class="page__sub">${new Date().toLocaleDateString('fr-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  </div>
</div>
<div class="stats-row">
  <div class="stat">
    <div class="stat__label">Références stock</div>
    <div class="stat__value">${totalRefs}</div>
    <div class="stat__trend">pièces référencées</div>
    <div class="stat__icon"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
  </div>
  <div class="stat ${alertes > 0 ? 'stat--alert' : ''}">
    <div class="stat__label">Alertes stock</div>
    <div class="stat__value">${alertes}</div>
    <div class="stat__trend">${alertes > 0 ? 'pièces à réapprovisionner' : 'Tout est OK'}</div>
    <div class="stat__icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
  </div>
  <div class="stat">
    <div class="stat__label">Valeur du stock</div>
    <div class="stat__value">${valeurStock.toFixed(0)}€</div>
    <div class="stat__trend">coût d'achat total</div>
    <div class="stat__icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
  </div>
  <div class="stat">
    <div class="stat__label">Réparations actives</div>
    <div class="stat__value">0</div>
    <div class="stat__trend">en cours ce mois</div>
    <div class="stat__icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
  </div>
</div>
<p class="section-title">Modules</p>
<div class="modules-grid">
  <a href="/admin/stock.html" class="module">
    <div class="module__header">
      <div class="module__icon"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
      <span class="module__status module__status--ok">ACTIF</span>
    </div>
    <div class="module__name">Stock</div>
    <div class="module__desc">Pièces détachées, quantités, prix et fournisseurs. ${alertes > 0 ? '<strong style="color:var(--danger)">'+alertes+' alerte(s)</strong>' : 'Tout est OK.'}</div>
  </a>
  <div class="module module--locked"><div class="module__header"><div class="module__icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="module__status module__status--soon">BIENTÔT</span></div><div class="module__name">Réparations</div><div class="module__desc">Suivi des dossiers, statuts et garanties.</div></div>
