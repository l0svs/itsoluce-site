<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IT Soluce — Dashboard ERP</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    color: #1d1d1f;
  }

  /* NAVBAR */
  .navbar {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #d2d2d7;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .navbar__logo {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }

  .navbar__logo .mark {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #0a2980 0%, #0052CC 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  .navbar__logo .text {
    font-size: 13px;
    font-weight: 600;
    color: #0a2980;
    letter-spacing: 3px;
  }

  .navbar__badge {
    background: #e8f0ff;
    color: #0052CC;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    margin-left: 10px;
    letter-spacing: 0.3px;
  }

  .navbar__right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .navbar__user {
    font-size: 13px;
    color: #6e6e73;
  }

  .navbar__user span {
    color: #1d1d1f;
    font-weight: 500;
  }

  .btn-logout {
    background: none;
    border: 1px solid #d2d2d7;
    color: #6e6e73;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-logout:hover {
    border-color: #cc0000;
    color: #cc0000;
    background: #fff2f2;
  }

  /* CONTENU */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px;
  }

  .page-header {
    margin-bottom: 36px;
  }

  .page-header h1 {
    font-size: 28px;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .page-header p {
    font-size: 15px;
    color: #6e6e73;
  }

  /* STATS CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: #ffffff;
    border: 1px solid #e5e5ea;
    border-radius: 14px;
    padding: 22px 20px;
  }

  .stat-card__label {
    font-size: 12px;
    font-weight: 500;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 10px;
  }

  .stat-card__value {
    font-size: 32px;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card__sub {
    font-size: 13px;
    color: #6e6e73;
  }

  .stat-card--alert .stat-card__value {
    color: #cc5500;
  }

  /* MODULES GRID */
  .modules-title {
    font-size: 18px;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 18px;
    letter-spacing: -0.3px;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .module-card {
    background: #ffffff;
    border: 1px solid #e5e5ea;
    border-radius: 16px;
    padding: 28px 24px;
    text-decoration: none;
    color: #1d1d1f;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
  }

  .module-card:hover {
    border-color: #0052CC;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 82, 204, 0.1);
  }

  .module-card--disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .module-card--disabled:hover {
    border-color: #e5e5ea;
    transform: none;
    box-shadow: none;
  }

  .module-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: #e8f0ff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .module-icon svg {
    width: 22px;
    height: 22px;
    stroke: #0052CC;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .module-icon--orange { background: #fff3e8; }
  .module-icon--orange svg { stroke: #cc5500; }
  .module-icon--green { background: #e8f5e9; }
  .module-icon--green svg { stroke: #1a7a2e; }
  .module-icon--purple { background: #f0e8ff; }
  .module-icon--purple svg { stroke: #5c2d91; }
  .module-icon--pink { background: #ffe8f0; }
  .module-icon--pink svg { stroke: #a0004e; }
  .module-icon--gray { background: #f0f0f2; }
  .module-icon--gray svg { stroke: #6e6e73; }

  .module-name {
    font-size: 16px;
    font-weight: 600;
    color: #1d1d1f;
  }

  .module-desc {
    font-size: 13px;
    color: #6e6e73;
    line-height: 1.5;
  }

  .module-badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
    margin-top: 4px;
    align-self: flex-start;
  }

  .module-badge--ready {
    background: #e8f5e9;
    color: #1a7a2e;
  }

  .module-badge--soon {
    background: #f0f0f2;
    color: #6e6e73;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px;
    color: #6e6e73;
    font-size: 14px;
  }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .modules-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .modules-grid { grid-template-columns: 1fr; }
    .navbar__user { display: none; }
    .main { padding: 24px 16px; }
    .page-header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/admin/dashboard.html" class="navbar__logo">
    <span class="mark">IT</span>
    <span class="text">SOLUCE</span>
    <span class="navbar__badge">ERP</span>
  </a>
  <div class="navbar__right">
    <span class="navbar__user">Connecté : <span id="userEmail">—</span></span>
    <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
  </div>
</nav>

<!-- CONTENU PRINCIPAL -->
<main class="main" id="mainContent">
  <div class="loading">Chargement...</div>
</main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://esltsiutcjcwdbhkkvms.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbHRzaXV0Y2pjd2RiaGtrdm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjM2OTEsImV4cCI6MjA5NzMzOTY5MX0.Sl2cdnqEr7VSBeq1wwMBpfQW9yBB0IG9RkOiZi9GXvo'

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Vérifier la session
  const { data: { session } } = await supabase.auth.getSession()
  if (!session) {
    window.location.href = '/admin/login.html'
  }

  // Afficher l'email de l'utilisateur
  document.getElementById('userEmail').textContent = session.user.email

  // Charger les stats du stock
  const { data: stockData, error } = await supabase
    .from('stock')
    .select('quantite, seuil_alerte, prix_achat, prix_vente')

  let totalArticles = 0
  let alertes = 0
  let valeurStock = 0

  if (stockData) {
    totalArticles = stockData.length
    alertes = stockData.filter(p => p.quantite <= p.seuil_alerte).length
    valeurStock = stockData.reduce((acc, p) => acc + (p.quantite * p.prix_achat), 0)
  }

  // Rendre le dashboard
  document.getElementById('mainContent').innerHTML = `
    <div class="page-header">
      <h1>Tableau de bord</h1>
      <p>Bienvenue dans l'espace de gestion IT Soluce</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card__label">Références en stock</div>
        <div class="stat-card__value">${totalArticles}</div>
        <div class="stat-card__sub">pièces référencées</div>
      </div>
      <div class="stat-card ${alertes > 0 ? 'stat-card--alert' : ''}">
        <div class="stat-card__label">Alertes stock</div>
        <div class="stat-card__value">${alertes}</div>
        <div class="stat-card__sub">${alertes > 0 ? 'pièces à recommander' : 'tout est OK'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Valeur du stock</div>
        <div class="stat-card__value">${valeurStock.toFixed(0)}€</div>
        <div class="stat-card__sub">prix d'achat total</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Réparations actives</div>
        <div class="stat-card__value">0</div>
        <div class="stat-card__sub">en cours</div>
      </div>
    </div>

    <p class="modules-title">Modules</p>

    <div class="modules-grid">

      <a href="/admin/stock.html" class="module-card">
        <div class="module-icon">
          <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="12.01"/></svg>
        </div>
        <div>
          <div class="module-name">Stock</div>
          <div class="module-desc">Gérer les pièces détachées, quantités, prix et fournisseurs.</div>
        </div>
        <span class="module-badge module-badge--ready">✓ Disponible</span>
      </a>

      <div class="module-card module-card--disabled">
        <div class="module-icon module-icon--orange">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div>
          <div class="module-name">Réparations</div>
          <div class="module-desc">Suivi des dossiers de réparation en cours et historique.</div>
        </div>
        <span class="module-badge module-badge--soon">Bientôt</span>
      </div>

      <div class="module-card module-card--disabled">
        <div class="module-icon module-icon--green">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="module-name">Clients</div>
          <div class="module-desc">Base de données clients, contacts et historique des réparations.</div>
        </div>
        <span class="module-badge module-badge--soon">Bientôt</span>
      </div>

      <div class="module-card module-card--disabled">
        <div class="module-icon module-icon--purple">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div>
          <div class="module-name">Devis & Factures</div>
          <div class="module-desc">Créer et suivre les devis et factures clients.</div>
        </div>
        <span class="module-badge module-badge--soon">Bientôt</span>
      </div>

      <div class="module-card module-card--disabled">
        <div class="module-icon module-icon--pink">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="module-name">Planning</div>
          <div class="module-desc">Gestion des rendez-vous et interventions à domicile.</div>
        </div>
        <span class="module-badge module-badge--soon">Bientôt</span>
      </div>

      <div class="module-card module-card--disabled">
        <div class="module-icon module-icon--gray">
          <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div>
          <div class="module-name">Statistiques</div>
          <div class="module-desc">Chiffre d'affaires, marges et indicateurs de performance.</div>
        </div>
        <span class="module-badge module-badge--soon">Bientôt</span>
      </div>

    </div>
  `

  // Déconnexion
  window.handleLogout = async function() {
    await supabase.auth.signOut()
    window.location.href = '/admin/login.html'
  }
</script>

</body>
</html>
