<!doctype html>
<html lang="fr" data-mode="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IT Soluce — ERP</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

:root {
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,0.12);
  --bg:    #0c0d0f;
  --bg2:   #111214;
  --bg3:   #18191c;
  --bg4:   #1f2023;
  --line:  rgba(255,255,255,0.06);
  --line2: rgba(255,255,255,0.1);
  --t1:    #e8e8e8;
  --t2:    #8a8f98;
  --t3:    #4b5059;
  --success: #34d399;
  --warning: #fbbf24;
  --danger:  #f87171;
  --sidebar: 220px;
  --topbar:  48px;
}

[data-mode="light"] {
  --bg:  #f8f8f8;
  --bg2: #ffffff;
  --bg3: #f2f2f4;
  --bg4: #eaeaec;
  --line:  rgba(0,0,0,0.06);
  --line2: rgba(0,0,0,0.1);
  --t1: #111114;
  --t2: #52525b;
  --t3: #a1a1aa;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--t1);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* ─── TOPBAR ─── */
.topbar {
  height: var(--topbar);
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-mark {
  font-size: 17px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -1px;
  line-height: 1;
}

.logo-sep {
  width: 1px;
  height: 14px;
  background: var(--line2);
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--t3);
  letter-spacing: 2px;
}

.topbar-divider {
  width: 1px;
  height: 18px;
  background: var(--line2);
  flex-shrink: 0;
}

.topbar-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.topbar-crumb {
  font-size: 12px;
  color: var(--t3);
  flex: 1;
}

.topbar-crumb span { color: var(--t2); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

/* Thème */
.theme-strip {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: 6px;
  padding: 4px 6px;
}

.tdot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: transform 0.12s;
  flex-shrink: 0;
}
.tdot:hover { transform: scale(1.25); }
.tdot.on { border-color: var(--t1); }
.tdot[data-c="blue"]   { background: #3b82f6; }
.tdot[data-c="green"]  { background: #34d399; }
.tdot[data-c="violet"] { background: #a78bfa; }
.tdot[data-c="amber"]  { background: #fbbf24; }

/* Mode */
.mode-strip {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: 6px;
  padding: 3px;
  gap: 1px;
}

.mbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 4px;
  color: var(--t3);
  transition: all 0.12s;
}
.mbtn:hover { color: var(--t1); background: var(--bg4); }
.mbtn.on { background: var(--accent-dim); color: var(--accent); }
.mbtn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

.user-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 8px 4px 4px;
  border: 1px solid var(--line2);
  border-radius: 99px;
  background: var(--bg3);
  font-size: 12px;
  color: var(--t2);
}

.user-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent-dim);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

.btn-out {
  padding: 5px 10px;
  border: 1px solid var(--line2);
  border-radius: 5px;
  background: none;
  color: var(--t3);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.12s;
}
.btn-out:hover { color: var(--danger); border-color: var(--danger); }

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar);
  background: var(--bg2);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  padding: 8px 0;
}

.nav-group {
  padding: 16px 10px 4px;
}

.nav-group-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--t3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 6px;
  margin-bottom: 3px;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 5px;
  font-size: 13px;
  color: var(--t2);
  text-decoration: none;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  transition: all 0.1s;
  margin-bottom: 1px;
}

.nav-link:hover { background: var(--bg3); color: var(--t1); }
.nav-link.active { background: var(--accent-dim); color: var(--accent); }

.nav-link svg {
  width: 15px;
  height: 15px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
  opacity: 0.75;
}
.nav-link.active svg { opacity: 1; }

.nav-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  min-width: 18px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  background: var(--bg4);
  color: var(--t3);
  padding: 0 4px;
}
.nav-count.warn { background: rgba(251,191,36,0.15); color: var(--warning); }
.nav-count.danger { background: rgba(248,113,113,0.15); color: var(--danger); }

.nav-hr { height: 1px; background: var(--line); margin: 8px 10px; }

.sidebar-footer {
  margin-top: auto;
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  font-size: 10px;
  color: var(--t3);
}

/* ─── CONTENU ─── */
.content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.page {
  padding: 24px 28px;
  max-width: 1400px;
}

/* ─── HEADER PAGE ─── */
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
}

.page-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -0.3px;
}

.page-date {
  font-size: 12px;
  color: var(--t3);
  margin-top: 2px;
}

.status-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--t2);
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 99px;
  padding: 4px 10px;
}

.pulse {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 2px rgba(52,211,153,0.2);
  animation: p 2.5s ease-in-out infinite;
}
@keyframes p { 0%,100%{opacity:1}50%{opacity:0.4} }

/* ─── GRID SYSTÈME ─── */
.g {
  display: grid;
  gap: 10px;
  margin-bottom: 10px;
}

.g-4 { grid-template-columns: repeat(4,1fr); }
.g-3 { grid-template-columns: repeat(3,1fr); }
.g-2 { grid-template-columns: 1fr 1fr; }
.g-52 { grid-template-columns: 5fr 2fr; }
.g-32 { grid-template-columns: 3fr 2fr; }
.g-23 { grid-template-columns: 2fr 3fr; }

/* ─── KPI CARD ─── */
.kpi {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  position: relative;
}

.kpi__label {
  font-size: 11px;
  color: var(--t3);
  font-weight: 500;
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

.kpi__num {
  font-size: 24px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 5px;
}

.kpi__meta {
  font-size: 11px;
  color: var(--t3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.kpi__tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 5px;
  border-radius: 3px;
}
.tag-ok  { background: rgba(52,211,153,0.12); color: var(--success); }
.tag-w   { background: rgba(251,191,36,0.12); color: var(--warning); }
.tag-d   { background: rgba(248,113,113,0.12); color: var(--danger); }
.tag-b   { background: var(--accent-dim); color: var(--accent); }
.tag-neu { background: var(--bg4); color: var(--t2); }

/* ─── SECTION LABEL ─── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  margin-top: 6px;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.7px;
}

.section-action {
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  cursor: pointer;
  opacity: 0.8;
}
.section-action:hover { opacity: 1; }

/* ─── CARD ─── */
.card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}

.card-head {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--t1);
}

.card-link {
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  opacity: 0.8;
}
.card-link:hover { opacity: 1; }

/* ─── LIST ROW ─── */
.row {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--line);
  gap: 10px;
  transition: background 0.08s;
}
.row:last-child { border-bottom: none; }
.row:hover { background: var(--bg3); }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-ok { background: var(--success); }
.dot-w  { background: var(--warning); }
.dot-d  { background: var(--danger); }
.dot-b  { background: var(--accent); }
.dot-g  { background: var(--t3); }

.row-main { flex: 1; min-width: 0; }
.row-name { font-size: 12px; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub  { font-size: 11px; color: var(--t3); margin-top: 1px; }
.row-right { font-size: 11px; color: var(--t3); text-align: right; flex-shrink: 0; }
.row-right strong { display: block; font-size: 12px; color: var(--t1); font-weight: 500; }

/* ─── MINI BARS ─── */
.bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: 12px 14px 10px;
  height: 64px;
}
.bar {
  flex: 1;
  background: var(--line2);
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: background 0.15s;
}
.bar:hover { background: var(--accent); }
.bar.cur { background: var(--accent); opacity: 0.5; }
.bar-labels {
  display: flex;
  justify-content: space-between;
  padding: 0 14px 10px;
  font-size: 10px;
  color: var(--t3);
}

/* ─── MINI CALENDRIER ─── */
.cal {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 1px;
  padding: 10px 12px;
}

.cd {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--t3);
  border-radius: 3px;
}
.cd-h { font-weight: 600; color: var(--t3); font-size: 9px; }
.cd-t { background: var(--accent); color: #fff; font-weight: 600; }
.cd-e { background: var(--accent-dim); color: var(--accent); }

/* ─── TÂCHE ─── */
.task {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--line);
  transition: background 0.08s;
}
.task:last-child { border-bottom: none; }
.task:hover { background: var(--bg3); }

.task-box {
  width: 13px;
  height: 13px;
  border-radius: 3px;
  border: 1.5px solid var(--t3);
  flex-shrink: 0;
}
.task-box.done { background: var(--success); border-color: var(--success); }

.task-text { font-size: 12px; color: var(--t1); flex: 1; }
.task-text.done { color: var(--t3); text-decoration: line-through; }

.task-tag {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
  flex-shrink: 0;
}

/* ─── RÉSEAUX ─── */
.social {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  gap: 10px;
  border-bottom: 1px solid var(--line);
  transition: background 0.08s;
}
.social:last-child { border-bottom: none; }
.social:hover { background: var(--bg3); }

.social-ico {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: var(--bg4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.social-name { font-size: 12px; color: var(--t1); flex: 1; }
.social-handle { font-size: 10px; color: var(--t3); }
.social-stat { font-size: 10px; color: var(--t3); text-align: right; }

/* ─── LOADING ─── */
.loader {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
  font-size: 12px;
  color: var(--t3);
}
.spin {
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--line2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width:1000px) {
  .g-4{grid-template-columns:1fr 1fr;}
  .g-3{grid-template-columns:1fr 1fr;}
  .g-52,.g-32,.g-23{grid-template-columns:1fr;}
}
@media(max-width:640px) {
  .sidebar{display:none;}
  .g-4,.g-3,.g-2{grid-template-columns:1fr 1fr;}
  .page{padding:16px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="/admin/dashboard.html" class="logo">
    <span class="logo-mark">IT</span>
    <span class="logo-sep"></span>
    <span class="logo-sub">SOLUCE</span>
  </a>
  <div class="topbar-divider"></div>
  <span class="topbar-badge">ERP</span>
  <span class="topbar-crumb"><span>Dashboard</span></span>

  <div class="topbar-right">
    <div class="theme-strip">
      <div class="tdot on" data-c="blue"   onclick="setAccent('#3b82f6','rgba(59,130,246,0.12)')"></div>
      <div class="tdot"    data-c="green"  onclick="setAccent('#34d399','rgba(52,211,153,0.12)')"></div>
      <div class="tdot"    data-c="violet" onclick="setAccent('#a78bfa','rgba(167,139,250,0.12)')"></div>
      <div class="tdot"    data-c="amber"  onclick="setAccent('#fbbf24','rgba(251,191,36,0.12)')"></div>
    </div>
    <div class="mode-strip">
      <button class="mbtn" data-m="light" onclick="setMode('light')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="mbtn on" data-m="auto" onclick="setMode('auto')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="mbtn" data-m="dark" onclick="setMode('dark')">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <div class="topbar-divider"></div>
    <div class="user-pill">
      <div class="user-av" id="uAv">—</div>
      <span id="uEmail" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</span>
    </div>
    <button class="btn-out" onclick="doLogout()">Quitter</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-group-label">Vue d'ensemble</div>
      <button class="nav-link active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
    </div>
    <div class="nav-hr"></div>
    <div class="nav-group">
      <div class="nav-group-label">Opérations</div>
      <a href="/admin/stock.html" class="nav-link">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Stock
        <span class="nav-count warn" id="nb-alert">—</span>
      </a>
      <button class="nav-link" onclick="soon()">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        Réparations
        <span class="nav-count" id="nb-rep">0</span>
      </button>
      <button class="nav-link" onclick="soon()">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Clients
        <span class="nav-count" id="nb-cli">0</span>
      </button>
    </div>
    <div class="nav-hr"></div>
    <div class="nav-group">
      <div class="nav-group-label">Finance</div>
      <button class="nav-link" onclick="soon()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Devis
        <span class="nav-count">0</span>
      </button>
      <button class="nav-link" onclick="soon()">
        <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Factures
        <span class="nav-count">0</span>

<script>
function setAccent(color, dim) {
  document.documentElement.style.setProperty('--accent', color)
  document.documentElement.style.setProperty('--accent-dim', dim)
  localStorage.setItem('erp-accent', color)
  localStorage.setItem('erp-dim', dim)
  document.querySelectorAll('.tdot').forEach(d => {
    d.classList.toggle('on', getComputedStyle(d).backgroundColor === hexToRgb(color))
  })
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
  return `rgb(${r}, ${g}, ${b})`
}

function applyMode(m) {
  const eff = m === 'auto' ? (new Date().getHours() >= 7 && new Date().getHours() < 20 ? 'light' : 'dark') : m
  document.documentElement.setAttribute('data-mode', eff)
  if (eff === 'light') {
    document.documentElement.style.setProperty('--bg',   '#f8f8f8')
    document.documentElement.style.setProperty('--bg2',  '#ffffff')
    document.documentElement.style.setProperty('--bg3',  '#f2f2f4')
    document.documentElement.style.setProperty('--bg4',  '#eaeaec')
    document.documentElement.style.setProperty('--line', 'rgba(0,0,0,0.06)')
    document.documentElement.style.setProperty('--line2','rgba(0,0,0,0.1)')
    document.documentElement.style.setProperty('--t1',   '#111114')
    document.documentElement.style.setProperty('--t2',   '#52525b')
    document.documentElement.style.setProperty('--t3',   '#a1a1aa')
  } else {
    document.documentElement.style.setProperty('--bg',   '#0c0d0f')
    document.documentElement.style.setProperty('--bg2',  '#111214')
    document.documentElement.style.setProperty('--bg3',  '#18191c')
    document.documentElement.style.setProperty('--bg4',  '#1f2023')
    document.documentElement.style.setProperty('--line', 'rgba(255,255,255,0.06)')
    document.documentElement.style.setProperty('--line2','rgba(255,255,255,0.1)')
    document.documentElement.style.setProperty('--t1',   '#e8e8e8')
    document.documentElement.style.setProperty('--t2',   '#8a8f98')
    document.documentElement.style.setProperty('--t3',   '#4b5059')
  }
}

function setMode(m) {
  localStorage.setItem('erp-mode', m)
  document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('on', b.dataset.m === m))
  applyMode(m)
}

// Init au chargement
const sa = localStorage.getItem('erp-accent')
const sd = localStorage.getItem('erp-dim')
if (sa) { document.documentElement.style.setProperty('--accent', sa); document.documentElement.style.setProperty('--accent-dim', sd) }

const sm = localStorage.getItem('erp-mode') || 'auto'
document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('on', b.dataset.m === sm))
applyMode(sm)
setInterval(() => { if ((localStorage.getItem('erp-mode')||'auto') === 'auto') applyMode('auto') }, 60000)

window.soon = () => {}
</script>
