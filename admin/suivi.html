<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Suivi de réparation — IT Soluce</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="/favicon_io/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:#f2f2f4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#1a1a1a;}
.card{width:100%;max-width:380px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.head{background:#0052CC;padding:26px 20px;text-align:center;}
.head img{width:64px;height:64px;border-radius:14px;display:block;margin:0 auto 12px;background:#fff;}
.head-title{color:#fff;font-size:18px;font-weight:600;}
.body{padding:22px;}
.appareil-box{background:#f7f7f9;border-radius:12px;padding:14px 16px;margin-bottom:22px;}
.ab-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;}
.ab-nom{font-size:16px;font-weight:600;color:#1a1a1a;margin-top:3px;}
.ab-ref{font-size:12px;color:#666;margin-top:6px;}
.timeline{display:flex;flex-direction:column;}
.tl-step{display:flex;gap:13px;align-items:flex-start;}
.tl-icon-col{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-line{width:2px;height:32px;}
.tl-content{padding-top:3px;padding-bottom:8px;}
.tl-title{font-size:14px;font-weight:600;}
.tl-desc{font-size:12px;margin-top:1px;}
.done .tl-dot{background:#e6f7f0;color:#0a8050;}
.done .tl-line{background:#bfe8d6;}
.done .tl-title{color:#1a1a1a;}
.done .tl-desc{color:#999;}
.current .tl-dot{background:#0052CC;color:#fff;}
.current .tl-line{background:#e0e0e4;}
.current .tl-title{color:#0052CC;}
.current .tl-desc{color:#0052CC;}
.todo .tl-dot{background:#f2f2f4;color:#bbb;border:1px solid #e0e0e4;}
.todo .tl-line{background:#e0e0e4;}
.todo .tl-title{color:#bbb;}
.todo .tl-desc{color:#ccc;}
.tl-step:last-child .tl-line{display:none;}
.contact-box{margin-top:20px;padding:14px 16px;background:#e8f1fb;border-radius:12px;}
.cb-q{font-size:12px;color:#0052CC;}
.cb-tel{font-size:14px;font-weight:600;color:#0052CC;margin-top:4px;text-decoration:none;display:block;}
.cancelled{text-align:center;padding:20px;background:#fdeaea;border-radius:12px;color:#c0392b;font-size:14px;font-weight:500;}
.footer{text-align:center;padding:16px;font-size:11px;color:#aaa;border-top:1px solid #f0f0f0;}
.footer a{color:#0052CC;text-decoration:none;}
.loader{text-align:center;padding:50px 20px;color:#999;font-size:13px;}
.spin{width:24px;height:24px;border:2.5px solid #e0e0e4;border-top-color:#0052CC;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{text-align:center;padding:40px 24px;}
.error-ico{font-size:34px;margin-bottom:12px;}
.error-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.error-desc{font-size:13px;color:#888;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <img src="https://itsoluce.be/favicon_io/android-chrome-512x512.png" alt="IT Soluce"/>
    <div class="head-title">Suivi de réparation</div>
  </div>
  <div id="content">
    <div class="loader"><div class="spin"></div>Chargement de votre suivi…</div>
  </div>
  <div class="footer">IT Soluce · <a href="https://itsoluce.be/">itsoluce.be</a></div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const SB='https://esltsiutcjcwdbhkkvms.supabase.co'
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbHRzaXV0Y2pjd2RiaGtrdm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjM2OTEsImV4cCI6MjA5NzMzOTY5MX0.Sl2cdnqEr7VSBeq1wwMBpfQW9yBB0IG9RkOiZi9GXvo'
const sb=createClient(SB,SK)

const ETAPES=[
  {key:'recu',label:'Reçu',desc:'Appareil pris en charge',icon:'check'},
  {key:'diagnostic',label:'Diagnostic',desc:'Panne identifiée',icon:'check'},
  {key:'encours',label:'En cours de réparation',desc:'Réparation en cours',icon:'tool'},
  {key:'pret',label:'Prêt à récupérer',desc:'Vous pouvez venir le chercher',icon:'flag'}
]
const ORDRE={recu:0,diagnostic:1,attente:2,encours:2,pret:3,rendu:3,annule:-1}

function svgIcon(type){
  if(type==='check')return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
  if(type==='tool')return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>'
  if(type==='flag')return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>'
  return ''
}

function render(rep){
  const content=document.getElementById('content')
  const appareil=[rep.marque,rep.modele].filter(Boolean).join(' ')||rep.appareil||'Votre appareil'
  const ref=rep.suivi_token?('Réf. '+rep.suivi_token.slice(0,6).toUpperCase()):''
  const dateRecu=rep.created_at?new Date(rep.created_at).toLocaleDateString('fr-BE',{day:'numeric',month:'long'}):''

  if(rep.statut==='annule'){
    content.innerHTML='<div class="body"><div class="appareil-box"><div class="ab-label">Appareil</div><div class="ab-nom">'+appareil+'</div>'+(ref?'<div class="ab-ref">'+ref+'</div>':'')+'</div><div class="cancelled">Cette réparation a été annulée.<br>Contactez-nous pour plus d&apos;informations.</div><a class="cb-tel" href="tel:+32474056659" style="text-align:center;margin-top:16px;">📞 +32 474 05 66 59</a></div>'
    return
  }

  const niveau=ORDRE[rep.statut]!==undefined?ORDRE[rep.statut]:0
  let steps=''
  ETAPES.forEach((e,i)=>{
    let cls,icon
    if(rep.statut==='rendu'){cls='done';icon=svgIcon('check')}
    else if(i<niveau){cls='done';icon=svgIcon('check')}
    else if(i===niveau){cls='current';icon=svgIcon(e.icon)}
    else{cls='todo';icon=svgIcon(e.icon)}
    steps+='<div class="tl-step '+cls+'"><div class="tl-icon-col"><div class="tl-dot">'+icon+'</div><div class="tl-line"></div></div><div class="tl-content"><div class="tl-title">'+e.label+'</div><div class="tl-desc">'+e.desc+'</div></div></div>'
  })

  content.innerHTML='<div class="body"><div class="appareil-box"><div class="ab-label">Appareil</div><div class="ab-nom">'+appareil+'</div>'+((ref||dateRecu)?'<div class="ab-ref">'+ref+(ref&&dateRecu?' · ':'')+(dateRecu?'Reçu le '+dateRecu:'')+'</div>':'')+'</div><div class="timeline">'+steps+'</div><div class="contact-box"><div class="cb-q">Une question sur votre réparation ?</div><a class="cb-tel" href="tel:+32474056659">📞 +32 474 05 66 59</a></div></div>'
}

function showErr(){
  document.getElementById('content').innerHTML='<div class="error-box"><div class="error-ico">🔍</div><div class="error-title">Suivi introuvable</div><div class="error-desc">Ce lien de suivi n&apos;est pas valide ou a expiré.<br>Vérifiez le lien ou contactez-nous au +32 474 05 66 59.</div></div>'
}

async function load(){
  const params=new URLSearchParams(window.location.search)
  const token=params.get('t')
  if(!token){showErr();return}
  try{
    const {data,error}=await sb.from('suivi_public').select('*').eq('suivi_token',token).maybeSingle()
    if(error||!data){showErr();return}
    render(data)
  }catch(e){showErr()}
}
load()
</script>
</body>
</html>
